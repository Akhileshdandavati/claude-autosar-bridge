name: Pipeline Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Test ARXML generation (no API needed)
        run: python -m src.orchestrator --test --arxml-only

      - name: Test C code generation (no API needed)
        run: python -m src.c_code_generator --test

      - name: Run all 3 examples - ARXML + C code (no API needed)
        run: python run_examples.py

      - name: Test from_arxml mode (generic ARXML input)
        run: python -m src.c_code_generator --arxml output/generated/SpeedSensor
